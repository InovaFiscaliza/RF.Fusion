<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}RF.Fusion{% endblock %}</title>

    <!-- ===================== CSS INSTITUCIONAL ===================== -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/_Basic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/OutSystemsReactWidgets.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/AnatelReactiveTheme.AnatelReactiveTheme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/AnatelReactiveTheme.AnatelReactiveTheme.extra.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Desempenho_CW.Desempenho.css') }}">

    <!-- ===================== ESTILOS BASE DO SISTEMA ===================== -->
    <style>

        /* ===== Layout Geral ===== */

        .header {
            width: 100%;
        }

        .main-content {
            padding-top: 40px;
            padding-bottom: 80px;
        }

        /* ===== Breadcrumb ===== */

        .breadcrumb {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .breadcrumb a {
            text-decoration: none;
            color: #1f4f8b;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            margin: 0 6px;
            color: #9ca3af;
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="desktop">

<div class="layout layout-top fixed-header">

    <!-- ===================== HEADER INSTITUCIONAL ===================== -->
    <header class="header background-primary text-neutral-0">
        <div class="ThemeGrid_Container">

            <div class="display-flex align-items-center justify-content-space-between padding-y-s">

                <!-- LOGO / TÍTULO -->
                <div class="display-flex align-items-center gap-s">
                    <i class="fa fa-signal"></i>
                    <span class="font-semi-bold font-size-h5">
                        RF.Fusion
                    </span>
                </div>

                <!-- USUÁRIO -->
                <div class="display-flex align-items-center gap-s font-size-s">
                    <i class="fa fa-user"></i>
                    <span>{{ usuario or "Usuário" }}</span>
                </div>

            </div>

        </div>
    </header>

    <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
    <main class="main-content ThemeGrid_Container">

        <!-- Breadcrumb opcional -->
        {% block breadcrumb %}{% endblock %}

        <!-- Conteúdo dinâmico -->
        {% block content %}{% endblock %}

    </main>

</div>

{% block extra_js %}{% endblock %}

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}RF.Fusion{% endblock %}</title>

    <!-- ===================== CSS INSTITUCIONAL ===================== -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/_Basic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/OutSystemsReactWidgets.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/AnatelReactiveTheme.AnatelReactiveTheme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/AnatelReactiveTheme.AnatelReactiveTheme.extra.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Desempenho_CW.Desempenho.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/webfusion_base.css') }}">

    {% block extra_css %}{% endblock %}
</head>

<body class="desktop">

<div id="page-loading-overlay" class="page-loading-overlay" aria-hidden="true">
    <div class="page-loading-dialog" role="status" aria-live="polite">
        <div class="page-loading-spinner"></div>
        <div class="page-loading-title">Carregando</div>
        <div id="page-loading-message" class="page-loading-message">
            Aguarde enquanto a solicitação é processada.
        </div>
    </div>
</div>

<div class="layout layout-top fixed-header">

    <!-- ===================== HEADER INSTITUCIONAL ===================== -->
    <header class="header background-primary text-neutral-0">
        <div class="ThemeGrid_Container">

            <div class="display-flex align-items-center padding-y-s">

                <!-- LOGO / TÍTULO -->
                <div class="display-flex align-items-center gap-s">
                    <i class="fa fa-signal"></i>
                    <span class="font-semi-bold font-size-h5">
                        RF.Fusion
                    </span>
                </div>

            </div>

        </div>
    </header>

    <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
    <main class="main-content ThemeGrid_Container">

        <!-- Breadcrumb opcional -->
        {% block breadcrumb %}{% endblock %}

        <!-- Conteúdo dinâmico -->
        {% block content %}{% endblock %}

    </main>

    <footer class="wf-global-footer ThemeGrid_Container">
        Desenvolvido por LITE - Laboratório de Inovação Tecnológica - ANATEL
    </footer>

</div>

<script src="{{ url_for('static', filename='js/base_page.js', v='20260415-base-page-extraction') }}"></script>

{% block extra_js %}{% endblock %}

</body>
</html>

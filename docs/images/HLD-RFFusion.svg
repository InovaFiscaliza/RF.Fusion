<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">RF.Fusion High Level Design</title>
  <desc id="desc">Simplified high-level design of RF.Fusion showing sources, core services, shared repository, MariaDB, webfusion and operators.</desc>

  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5.2" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#1f4f8b"/>
    </marker>
    <marker id="arrow-slate" markerWidth="6" markerHeight="6" refX="5.2" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 31px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .note { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #163a66; }
      .lane {
        fill: url(#panel);
        stroke: #dbe3ee;
        stroke-width: 1.5;
        rx: 24;
      }
      .box-core {
        fill: #dbeafe;
        stroke: #93c5fd;
        stroke-width: 1.5;
        rx: 18;
      }
      .box-soft {
        fill: #eff6ff;
        stroke: #bfdbfe;
        stroke-width: 1.5;
        rx: 18;
      }
      .box-data {
        fill: #dcfce7;
        stroke: #86efac;
        stroke-width: 1.5;
        rx: 18;
      }
      .box-warn {
        fill: #ffedd5;
        stroke: #fdba74;
        stroke-width: 1.5;
        rx: 18;
      }
      .box-neutral {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        rx: 18;
      }
      .arrow {
        stroke: #1f4f8b;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow-blue);
      }
      .arrow-soft {
        stroke: #475569;
        stroke-width: 2.5;
        fill: none;
        marker-end: url(#arrow-slate);
      }
      .arrow-dashed {
        stroke: #64748b;
        stroke-width: 2.5;
        stroke-dasharray: 9 7;
        fill: none;
        marker-end: url(#arrow-slate);
      }
    </style>
  </defs>

  <rect width="1440" height="920" fill="url(#page)"/>

  <text x="54" y="54" class="title">RF.Fusion High Level Design</text>
  <text x="54" y="80" class="subtitle">
    <tspan x="54" dy="0">A cleaner runtime-oriented picture of ingestion, orchestration, storage</tspan>
    <tspan x="54" dy="18">and operator access</tspan>
  </text>

  <rect x="1132" y="36" width="248" height="78" class="box-neutral"/>
  <text x="1152" y="64" class="box-title">Legend</text>
  <line x1="1154" y1="84" x2="1198" y2="84" class="arrow"/>
  <text x="1210" y="88" class="small">current flow</text>
  <line x1="1154" y1="100" x2="1198" y2="100" class="arrow-dashed"/>
  <text x="1210" y="104" class="small">future / optional</text>

  <rect x="40" y="136" width="250" height="720" class="lane"/>
  <text x="62" y="170" class="lane-title">1. Sources</text>

  <rect x="62" y="198" width="218" height="112" class="box-soft"/>
  <text x="82" y="228" class="box-title">
    <tspan x="82" dy="0">Monitoring</tspan>
    <tspan x="82" dy="20">Stations</tspan>
  </text>
  <text x="82" y="261" class="body">Raw measurement files</text>
  <text x="82" y="282" class="body">Fixed stations and appColeta outputs</text>

  <rect x="62" y="352" width="206" height="98" class="box-warn"/>
  <text x="82" y="382" class="box-title">Manual Upload Inbox</text>
  <text x="82" y="407" class="body">
    <tspan x="82" dy="0">Future folder for</tspan>
    <tspan x="82" dy="20">itinerant analyzer uploads</tspan>
  </text>

  <rect x="62" y="492" width="206" height="98" class="box-neutral"/>
  <text x="82" y="522" class="box-title">Zabbix And Host Signals</text>
  <text x="82" y="547" class="body">
    <tspan x="82" dy="0">Connectivity and</tspan>
    <tspan x="82" dy="20">operational host context</tspan>
  </text>

  <rect x="330" y="136" width="430" height="720" class="lane"/>
  <text x="352" y="170" class="lane-title">2. Core Services</text>

  <rect x="356" y="198" width="210" height="126" class="box-core"/>
  <text x="376" y="228" class="box-title">appCataloga</text>
  <text x="376" y="253" class="body">
    <tspan x="376" dy="0">Discovery, backup</tspan>
    <tspan x="376" dy="20">and processing</tspan>
  </text>
  <text x="376" y="294" class="body">Queue execution and cleanup</text>
  <text x="376" y="314" class="small">Main operational core</text>

  <rect x="584" y="198" width="150" height="126" class="box-soft"/>
  <text x="604" y="228" class="box-title">appAnalise</text>
  <text x="604" y="253" class="body">Optional processor</text>
  <text x="604" y="274" class="body">Exports `.mat` files</text>

  <rect x="356" y="390" width="388" height="184" class="box-data"/>
  <text x="376" y="420" class="box-title">
    <tspan x="376" dy="0">Shared Repository</tspan>
    <tspan x="376" dy="20">(`/mnt/reposfi`)</tspan>
  </text>
  <text x="376" y="466" class="body">
    <tspan x="376" dy="0">Incoming payloads, canonical artifacts</tspan>
    <tspan x="376" dy="20">and quarantine areas</tspan>
  </text>
  <text x="376" y="508" class="body">
    <tspan x="376" dy="0">Repository path is part of the</tspan>
    <tspan x="376" dy="20">workflow contract</tspan>
  </text>
  <text x="376" y="552" class="small">`trash/` for canonical errored artifacts</text>
  <text x="376" y="570" class="small">
    <tspan x="376" dy="0">`resolved_files/` for</tspan>
    <tspan x="376" dy="18">superseded source artifacts</tspan>
  </text>

  <rect x="356" y="622" width="378" height="104" class="box-neutral"/>
  <text x="376" y="652" class="box-title">Background Work</text>
  <text x="376" y="677" class="body">
    <tspan x="376" dy="0">Garbage collection and metadata publication</tspan>
    <tspan x="376" dy="20">operate on the same repository contract</tspan>
  </text>

  <rect x="800" y="136" width="270" height="720" class="lane"/>
  <text x="822" y="170" class="lane-title">3. State</text>

  <rect x="826" y="214" width="218" height="396" class="box-core"/>
  <text x="846" y="244" class="box-title">MariaDB</text>
  <text x="846" y="269" class="body">Operational and analytical state</text>

  <rect x="846" y="300" width="178" height="108" class="box-neutral"/>
  <text x="866" y="330" class="box-title">BPDATA</text>
  <text x="866" y="355" class="body">HOST</text>
  <text x="866" y="376" class="body">HOST_TASK</text>
  <text x="866" y="397" class="body">FILE_TASK / HISTORY</text>

  <rect x="846" y="440" width="178" height="128" class="box-data"/>
  <text x="866" y="470" class="box-title">RFDATA</text>
  <text x="866" y="495" class="body">SITE / FILE / EQUIPMENT</text>
  <text x="866" y="516" class="body">FACT_SPECTRUM</text>
  <text x="866" y="537" class="body">bridge tables</text>

  <rect x="1110" y="136" width="290" height="720" class="lane"/>
  <text x="1132" y="170" class="lane-title">4. Access</text>

  <rect x="1136" y="218" width="238" height="116" class="box-soft"/>
  <text x="1156" y="248" class="box-title">webfusion</text>
  <text x="1156" y="273" class="body">
    <tspan x="1156" dy="0">Host, map, server, spectrum</tspan>
    <tspan x="1156" dy="20">and file views</tspan>
  </text>
  <text x="1156" y="314" class="body">Conventional host-check requests</text>

  <rect x="1136" y="390" width="238" height="92" class="box-neutral"/>
  <text x="1156" y="420" class="box-title">nginx + waitress</text>
  <text x="1156" y="445" class="body">Web serving and direct downloads</text>

  <rect x="1136" y="538" width="238" height="92" class="box-neutral"/>
  <text x="1156" y="568" class="box-title">Operators</text>
  <text x="1156" y="593" class="body">
    <tspan x="1156" dy="0">Inspect status, query data</tspan>
    <tspan x="1156" dy="20">and request checks</tspan>
  </text>

  <rect x="1136" y="686" width="238" height="92" class="box-warn"/>
  <text x="1156" y="716" class="box-title">Dashboards And Consumers</text>
  <text x="1156" y="741" class="body">
    <tspan x="1156" dy="0">Use published outputs</tspan>
    <tspan x="1156" dy="20">and exported metadata</tspan>
  </text>

  <path d="M 280 254 L 356 254" class="arrow"/>
  <path d="M 268 401 L 310 401 L 310 274 L 356 274" class="arrow-dashed"/>
  <path d="M 268 541 L 320 541 L 320 294 L 356 294" class="arrow-soft"/>

  <path d="M 566 254 L 584 254" class="arrow"/>
  <path d="M 461 324 L 461 390" class="arrow"/>
  <path d="M 659 324 L 659 390" class="arrow"/>

  <path d="M 734 254 L 826 254 L 826 354" class="arrow"/>
  <path d="M 734 474 L 826 474 L 826 504" class="arrow"/>

  <path d="M 1044 354 L 1136 354 L 1136 276" class="arrow-soft"/>

  <path d="M 734 474 L 1086 474 L 1086 436 L 1136 436" class="arrow-soft"/>

  <path d="M 1255 334 L 1255 390" class="arrow-soft"/>
  <path d="M 1255 482 L 1255 538" class="arrow-soft"/>
  <path d="M 734 674 L 1096 674 L 1096 732 L 1136 732" class="arrow-soft"/>

  <text x="1096" y="423" class="note">downloads</text>

  <text x="42" y="890" class="small">
    <tspan x="42" dy="0">Important distinction: HOST is operational, SITE is geographic, and EQUIPMENT is defined by the measurement payload.</tspan>
    <tspan x="42" dy="18">This separation is intentional in both code and data modeling.</tspan>
  </text>
</svg>
